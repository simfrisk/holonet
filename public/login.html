<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0d0f1a;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(85, 120, 245, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 0%, rgba(30, 20, 40, 0.4) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8eaf5;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background-color: #13152a;
            border: 1px solid rgba(38, 40, 64, 0.6);
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 16px 48px rgba(0, 0, 15, 0.6);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #e8eaf5;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 13px;
            color: #7c84a8;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #7c84a8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .pw-wrap {
            position: relative;
        }

        #password {
            width: 100%;
            padding: 11px 44px 11px 14px;
            background-color: #0d0f1a;
            border: 1.5px solid rgba(38, 40, 64, 0.8);
            border-radius: 8px;
            color: #e8eaf5;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        #password:focus {
            border-color: #5578f5;
        }

        #password.invalid {
            border-color: #e85555;
            animation: shake 0.3s ease;
        }

        .pw-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            color: #7c84a8;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .pw-toggle:hover {
            color: #e8eaf5;
        }

        .pw-toggle:focus-visible {
            outline: 2px solid #5578f5;
            outline-offset: 2px;
        }

        .pw-toggle svg {
            width: 18px;
            height: 18px;
        }

        .pw-toggle .icon-hide { display: none; }
        .pw-toggle.is-visible .icon-show { display: none; }
        .pw-toggle.is-visible .icon-hide { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }

        .error-msg {
            font-size: 12px;
            color: #e85555;
            margin-top: 8px;
            min-height: 16px;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #5578f5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s, opacity 0.15s;
        }

        button[type="submit"]:hover:not(:disabled) {
            background-color: #3d5ee0;
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">OSC Sales</div>
    <div class="subtitle">Enter your password to continue</div>

    <form id="loginForm">
        <label for="password">Password</label>
        <div class="pw-wrap">
            <input type="password" id="password" autocomplete="current-password" autofocus>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" aria-pressed="false">
                <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
            </button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" id="submitBtn">Sign in</button>
    </form>
</div>

<script src="/js/login.js" defer></script>
</body>
</html>
