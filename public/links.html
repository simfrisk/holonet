<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
    <style>
        /* =========================================
           COLOR TOKENS (mirrors main app)
           ========================================= */
        :root {
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-surface-elevated: #f8f9fa;
            --color-border: #ddd;
            --color-text: #333;
            --color-text-muted: #666;
            --color-text-subtle: #999;
            --color-primary: #0066cc;
            --color-primary-hover: #0052a3;
            --color-success: #28a745;
            --color-success-hover: #218838;
            --color-warning: #f0b429;
            --color-danger: #dc3545;
            --color-neutral: #6c757d;
            --color-neutral-hover: #5a6268;
            --color-input-bg: #ffffff;
            --color-modal-footer-bg: #f8f9fa;
            --color-shadow: rgba(0, 0, 0, 0.1);
            --color-shadow-modal: rgba(0, 0, 0, 0.3);
        }

        html[data-theme="dark"] {
            --color-bg: #0d0f1a;
            --color-surface: #13152a;
            --color-surface-elevated: #1b1e35;
            --color-border: #26284060;
            --color-text: #e8eaf5;
            --color-text-muted: #7c84a8;
            --color-text-subtle: #4d5375;
            --color-primary: #5578f5;
            --color-primary-hover: #3d5ee0;
            --color-success: #2ecc87;
            --color-success-hover: #25a86e;
            --color-warning: #f0b429;
            --color-danger: #e85555;
            --color-neutral: #3d4266;
            --color-neutral-hover: #4d5280;
            --color-input-bg: #0d0f1a;
            --color-modal-footer-bg: #1b1e35;
            --color-shadow: rgba(0, 0, 15, 0.5);
            --color-shadow-modal: rgba(0, 0, 15, 0.72);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--color-bg);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        html[data-theme="dark"] body {
            background-image: radial-gradient(ellipse at 20% 0%, rgba(85, 120, 245, 0.06) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 0%, rgba(30, 20, 40, 0.3) 0%, transparent 60%);
        }

        .container {
            background-color: var(--color-surface);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px var(--color-shadow);
        }

        /* Header */
        header {
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            transition: background-color 0.15s, color 0.15s;
        }

        .back-btn:hover {
            background-color: var(--color-surface-elevated);
            color: var(--color-text);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--color-text);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 16px;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s, transform 0.1s, opacity 0.15s;
            text-decoration: none;
            line-height: 1;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background-color: var(--color-primary);
            color: #fff;
        }
        .btn-primary:hover { background-color: var(--color-primary-hover); }

        .btn-success {
            background-color: var(--color-success);
            color: #fff;
        }
        .btn-success:hover { background-color: var(--color-success-hover); }

        .btn-danger {
            background-color: var(--color-danger);
            color: #fff;
        }
        .btn-danger:hover { opacity: 0.88; }

        .btn-neutral {
            background-color: var(--color-surface-elevated);
            color: var(--color-text-muted);
            border: 1px solid var(--color-border);
        }
        .btn-neutral:hover {
            background-color: var(--color-border);
            color: var(--color-text);
        }

        .dark-mode-btn {
            background: none;
            border: 1px solid var(--color-border);
            border-radius: 7px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--color-text-muted);
            font-size: 16px;
            transition: background-color 0.15s, color 0.15s;
        }
        .dark-mode-btn:hover {
            background-color: var(--color-surface-elevated);
            color: var(--color-text);
        }

        /* Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* Link card -- mirrors draft-tile */
        .link-tile {
            position: relative;
            background-color: var(--color-surface-elevated);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .link-tile:hover {
            box-shadow: 0 4px 16px var(--color-shadow);
            border-color: var(--color-primary);
        }

        .tile-delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background-color: transparent;
            color: var(--color-text-subtle);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
            padding: 0;
        }

        .tile-delete-btn:hover {
            background-color: var(--color-danger);
            color: #fff;
            border-color: var(--color-danger);
        }

        .tile-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
            padding-right: 28px;
            line-height: 1.3;
        }

        .tile-fields {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
        }

        .field-label {
            font-size: 11px;
            color: var(--color-text-subtle);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 68px;
        }

        .field-val {
            font-size: 12px;
            color: var(--color-text-muted);
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 5px;
            padding: 3px 8px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        .field-val.url-val {
            font-family: 'Inter', sans-serif;
            color: var(--color-primary);
        }

        .pw-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            gap: 4px;
        }

        .pw-wrapper .field-val {
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--color-border);
            border-radius: 5px;
            width: 26px;
            height: 26px;
            padding: 0;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            color: var(--color-text-muted);
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s;
        }

        .icon-btn:hover {
            background-color: var(--color-surface-elevated);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .icon-btn.copied {
            background-color: #d4edda;
            border-color: var(--color-success);
            color: var(--color-success);
        }

        html[data-theme="dark"] .icon-btn.copied {
            background-color: #0d2e1c;
        }

        /* Search / add toolbar */
        .links-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid var(--color-border);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            background-color: var(--color-input-bg);
            color: var(--color-text);
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input:focus {
            border-color: var(--color-primary);
        }

        .search-input::placeholder {
            color: var(--color-text-subtle);
        }

        /* Tile actions */
        .tile-actions {
            display: flex;
            gap: 7px;
            margin-top: 2px;
        }

        .tile-actions .btn {
            font-size: 12px;
            padding: 6px 12px;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-muted);
        }

        .empty-state i {
            font-size: 3em;
            margin-bottom: 12px;
            display: block;
            color: var(--color-text-subtle);
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--color-shadow-modal);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--color-surface);
            border-radius: 12px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 10px 40px var(--color-shadow-modal);
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--color-text-muted);
            line-height: 1;
            padding: 2px;
            transition: color 0.15s;
        }

        .modal-close:hover { color: var(--color-text); }

        .modal-body {
            padding: 20px 22px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding: 14px 22px;
            background-color: var(--color-modal-footer-bg);
            border-top: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--color-border);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            background-color: var(--color-input-bg);
            color: var(--color-text);
            transition: border-color 0.15s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--color-primary);
        }

        .form-group input.invalid {
            border-color: var(--color-danger);
        }

        .form-hint {
            font-size: 11px;
            color: var(--color-text-subtle);
            margin-top: 4px;
        }

        .confirm-message {
            font-size: 14px;
            color: var(--color-text-muted);
            line-height: 1.5;
        }

        .confirm-name {
            font-weight: 600;
            color: var(--color-text);
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-row">
            <div class="header-left">
                <a href="/contact-list.html" class="back-btn">
                    <i class="ti ti-arrow-left"></i> Contact List
                </a>
                <h1>Quick Links</h1>
            </div>
            <div class="header-actions">
                <button class="dark-mode-btn" id="darkModeBtn" title="Toggle dark mode">
                    <i class="ti ti-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="links-toolbar">
        <input type="search" id="searchInput" class="search-input" placeholder="Search links...">
        <button class="btn btn-primary">
            <i class="ti ti-plus"></i> Add Link
        </button>
    </div>

    <div class="links-grid" id="linksGrid">
        <!-- Rendered by JS -->
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="editModalTitle">Add Link</h2>
            <button class="modal-close">&#x2715;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editCardId">

            <div class="form-group">
                <label for="fieldName">Name <span style="color:var(--color-danger)">*</span></label>
                <input type="text" id="fieldName" placeholder="e.g. FreeScout Admin">
            </div>
            <div class="form-group">
                <label for="fieldUrl">URL</label>
                <input type="url" id="fieldUrl" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label for="fieldUsername">Username</label>
                <input type="text" id="fieldUsername" placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="fieldPassword">Password</label>
                <input type="text" id="fieldPassword" placeholder="your-password">
                <div class="form-hint">Stored locally in your browser only.</div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-neutral">Cancel</button>
            <button class="btn btn-primary">Save</button>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Delete Link?</h2>
            <button class="modal-close">&#x2715;</button>
        </div>
        <div class="modal-body">
            <p class="confirm-message">
                Are you sure you want to delete <span class="confirm-name" id="confirmCardName"></span>? This cannot be undone.
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-neutral">Cancel</button>
            <button class="btn btn-danger">
                <i class="ti ti-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<script src="/js/links-page.js" defer></script>
</body>
</html>
